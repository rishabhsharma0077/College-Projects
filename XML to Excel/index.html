<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XML to Excel Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>XML → Excel Converter</h1>
  <p>Upload your XML file and convert it instantly</p>

  <div class="upload-box">
    <input type="file" id="fileInput" accept=".xml">
    <label for="fileInput">Choose XML File</label>
  </div>

  <button onclick="convertXML()">Convert</button>

  <div id="preview"></div>
</div>

<script src="script.js"></script>
</body>
</html>
